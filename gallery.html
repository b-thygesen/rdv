  <title>Galleri – Rømø dragtens venner</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Header -->
  <header>
    <div class="container header-inner">
      <a class="site-logo" href="index.html">Rømø dragtens venner</a>

        <span></span><span></span><span></span>

    <div class="gallery-header">
      <div class="container">
        <h1>Image Gallery</h1>
        <p>A collection of placeholder images. Click any photo to view it full size.</p>
      </div>
    </div>

    <!-- Gallery Grid -->
    <div class="container">
      <div class="gallery-grid">

        <div class="gallery-item" role="button" aria-label="View image 1">
          <img src="https://picsum.photos/seed/rdv1/800/600" alt="Placeholder image 1"
               data-full="https://picsum.photos/seed/rdv1/1200/900" loading="lazy" />
          <div class="overlay"><span class="overlay-label">Photo 01</span></div>
        </div>

    </div>

  </main>

  <!-- Lightbox Modal -->
  <div id="lightbox" class="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
    <div class="lightbox-content">
      <button class="lightbox-close" aria-label="Close">&times;</button>
      <button class="lightbox-prev" aria-label="Previous image">&#8592;</button>
      <button class="lightbox-next" aria-label="Next image">&#8594;</button>
      <img class="lightbox-img" src="" alt="" />
      <p class="lightbox-caption"></p>
    </div>
  </div>
